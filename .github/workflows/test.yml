---
name: Python tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  linux-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install ngspice
      run: |
        sudo apt-get update
        sudo apt-get install ngspice
    - name: Install dependencies
      run: |
        pipx install uv
        uv pip install --system pytest
        uv pip install --system -e .[all]
    - name: Full Python tests
      run: |
        pytest -s

  windows-test:
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ['3.12']
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install ngspice
      run: |
        # Download and extract ngspice to expected location
        Invoke-WebRequest -Uri "https://sourceforge.net/projects/ngspice/files/ng-spice-rework/44.2/ngspice-44.2-win64.zip" -OutFile "ngspice.zip"
        Expand-Archive -Path "ngspice.zip" -DestinationPath "C:\Program Files" -Force
        Remove-Item "ngspice.zip"
        echo "C:\Program Files\Spice64\bin" >> $env:GITHUB_PATH
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv
        uv pip install --system pytest
        uv pip install --system -e .[all]
    - name: Full Python tests
      run: |
        pytest -s

  macos-test:
    runs-on: macos-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ['3.12']
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install ngspice
      run: |
        brew install ngspice # for power electronics problems
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv
        uv pip install --system pytest
        uv pip install --system -e .[all]
    - name: Full Python tests
      run: |
        pytest -s
